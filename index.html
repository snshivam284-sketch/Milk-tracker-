<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0061a4">
    <title>Milk Tracker Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0061a4;
            --secondary-container: #d1e4ff;
            --surface: #fdfbff;
            --surface-container: #ffffff;
            --text-main: #1a1c1e;
            --text-sub: #74777f;
            --error: #ba1a1a;
            --glass: rgba(255, 255, 255, 0.8);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #d1e4ff;
                --secondary-container: #00497d;
                --surface: #111318;
                --surface-container: #1a1c1e;
                --text-main: #e2e2e6;
                --text-sub: #8e9199;
                --glass: rgba(26, 28, 30, 0.85);
            }
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--surface);
            color: var(--text-main);
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Header */
        header {
            padding: 60px 24px 20px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
        }

        header h1 { margin: 0; font-size: 22px; font-weight: 800; }

        main { flex: 1; overflow-y: auto; padding: 0 20px 140px; -webkit-overflow-scrolling: touch; }

        /* Dashboard Cards */
        .card-hero {
            background: linear-gradient(135deg, var(--primary), #004a7c);
            border-radius: 32px; padding: 28px; color: white;
            box-shadow: 0 20px 40px rgba(0, 97, 164, 0.2);
            margin-top: 10px;
        }

        .hero-val { font-size: 42px; font-weight: 800; margin: 8px 0; }
        .hero-label { font-size: 13px; font-weight: 700; opacity: 0.8; text-transform: uppercase; }

        .chart-wrap {
            background: var(--surface-container);
            border-radius: 32px; padding: 20px; margin: 24px 0;
            border: 1px solid rgba(0,0,0,0.05);
            height: 240px;
        }

        /* Lists */
        .item-row {
            background: var(--surface-container);
            padding: 16px 20px; border-radius: 20px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(0,0,0,0.03);
            transition: transform 0.2s;
        }

        .item-row:active { transform: scale(0.98); }

        .item-info { display: flex; flex-direction: column; }
        .item-date { font-weight: 700; font-size: 16px; }
        .item-sub { font-size: 12px; color: var(--text-sub); font-weight: 600; }

        .item-actions { display: flex; gap: 12px; align-items: center; }
        .btn-icon { background: none; border: none; font-size: 18px; cursor: pointer; padding: 8px; border-radius: 12px; }
        .btn-edit { color: var(--primary); background: var(--secondary-container); }
        .btn-del { color: var(--error); background: rgba(186, 26, 26, 0.1); }

        /* Navigation */
        nav {
            position: fixed; bottom: 0; width: 100%;
            height: calc(85px + var(--safe-bottom));
            background: var(--glass); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around;
            padding-bottom: var(--safe-bottom);
            border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 50;
        }

        .nav-item {
            background: none; border: none; flex: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-sub); transition: 0.3s;
        }

        .nav-item.active { color: var(--primary); }
        .nav-pill { width: 56px; height: 32px; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
        .nav-item.active .nav-pill { background: var(--secondary-container); }

        /* FAB */
        .fab {
            position: fixed; right: 20px; bottom: calc(var(--safe-bottom) + 100px);
            width: 64px; height: 64px; border-radius: 20px;
            background: var(--primary); color: white;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 12px 24px rgba(0, 97, 164, 0.3);
            border: none; font-size: 30px; z-index: 40;
        }

        /* Modal Sheets */
        .overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 100;
            align-items: flex-end;
        }

        .sheet {
            background: var(--surface); width: 100%;
            border-radius: 32px 32px 0 0; padding: 32px 24px calc(32px + var(--safe-bottom));
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .sheet.open { transform: translateY(0); }

        .m3-input {
            width: 100%; padding: 18px; border-radius: 16px;
            border: 2px solid var(--secondary-container);
            background: var(--surface); color: inherit; font-size: 16px;
            margin-bottom: 20px;
        }

        .btn-main {
            width: 100%; padding: 20px; border-radius: 100px;
            background: var(--primary); color: white;
            border: none; font-weight: 800; font-size: 16px;
        }

        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body>

    <header>
        <h1>Milk Tracker</h1>
        <div style="font-size: 12px; font-weight: 800; opacity: 0.6;" id="header-date">MAR 08</div>
    </header>

    <main>
        <section id="home" class="section active">
            <div class="card-hero">
                <div class="hero-label" id="month-label">MARCH 2026</div>
                <div class="hero-val" id="total-liters">0.0 L</div>
                <div style="font-weight: 600;" id="total-cost">₹0 estimated</div>
            </div>

            <div class="chart-wrap">
                <canvas id="mainChart"></canvas>
            </div>

            <h3 style="margin: 24px 0 16px; font-size: 18px;">Recent Activity</h3>
            <div id="recent-logs"></div>
        </section>

        <section id="history" class="section">
            <h2 style="font-weight: 800; margin-bottom: 24px;">All Records</h2>
            <div id="history-logs"></div>
        </section>

        <section id="settings" class="section">
            <h2 style="font-weight: 800; margin-bottom: 24px;">Settings</h2>
            <div class="card-hero" style="background: var(--surface-container); color: var(--text-main); border: 1px solid var(--secondary-container);">
                <label style="font-size: 12px; font-weight: 800; color: var(--text-sub);">MILK PRICE (₹/L)</label>
                <input type="number" id="price-set" class="m3-input" style="margin-top:8px" oninput="updateSettings()" inputmode="decimal">
                
                <button class="btn-main" style="background: var(--error);" onclick="wipeData()">Reset Application</button>
            </div>
        </section>
    </main>

    <nav>
        <button class="nav-item active" onclick="navigate('home', this)"><div class="nav-pill">🏠</div><span>Home</span></button>
        <button class="nav-item" onclick="navigate('history', this)"><div class="nav-pill">📊</div><span>History</span></button>
        <button class="nav-item" onclick="navigate('settings', this)"><div class="nav-pill">⚙️</div><span>Settings</span></button>
    </nav>

    <button class="fab" onclick="openModal()">+</button>

    <div class="overlay" id="overlay" onclick="closeModal()">
        <div class="sheet" id="sheet" onclick="event.stopPropagation()">
            <h2 id="modal-title" style="margin: 0 0 24px 0; font-weight: 800;">Add Entry</h2>
            <input type="hidden" id="edit-id">
            
            <label style="font-size: 12px; font-weight: 700; color: var(--text-sub);">AMOUNT (LITERS)</label>
            <input type="number" id="in-vol" class="m3-input" placeholder="0.0" step="0.1" inputmode="decimal">

            <label style="font-size: 12px; font-weight: 700; color: var(--text-sub);">DATE</label>
            <input type="date" id="in-date" class="m3-input">

            <button class="btn-main" onclick="saveEntry()">Save Record</button>
        </div>
    </div>

    <script>
        const AppState = {
            logs: JSON.parse(localStorage.getItem('milk_db_v2')) || [],
            price: localStorage.getItem('milk_price_v2') || 60,
            
            save() {
                localStorage.setItem('milk_db_v2', JSON.stringify(this.logs));
                localStorage.setItem('milk_price_v2', this.price);
                if(window.navigator.vibrate) window.navigator.vibrate(12);
            }
        };

        let chart = null;

        // Start
        document.getElementById('price-set').value = AppState.price;
        document.getElementById('header-date').innerText = new Date().toLocaleDateString('en-US', {day:'2-digit', month:'short'}).toUpperCase();
        updateUI();

        function navigate(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'home') updateUI();
            if(id === 'history') renderHistory();
        }

        function openModal(editId = null) {
            const overlay = document.getElementById('overlay');
            const sheet = document.getElementById('sheet');
            
            if(editId) {
                const log = AppState.logs.find(l => l.id === editId);
                document.getElementById('modal-title').innerText = "Edit Entry";
                document.getElementById('edit-id').value = editId;
                document.getElementById('in-vol').value = log.vol;
                document.getElementById('in-date').value = log.date;
            } else {
                document.getElementById('modal-title').innerText = "Add Entry";
                document.getElementById('edit-id').value = "";
                document.getElementById('in-vol').value = "";
                document.getElementById('in-date').valueAsDate = new Date();
            }

            overlay.style.display = 'flex';
            setTimeout(() => sheet.classList.add('open'), 10);
        }

        function closeModal() {
            document.getElementById('sheet').classList.remove('open');
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 300);
        }

        function saveEntry() {
            const vol = parseFloat(document.getElementById('in-vol').value);
            const date = document.getElementById('in-date').value;
            const editId = document.getElementById('edit-id').value;

            if(!vol || !date) return;

            if(editId) {
                const idx = AppState.logs.findIndex(l => l.id == editId);
                AppState.logs[idx] = { id: parseInt(editId), vol, date };
            } else {
                AppState.logs.push({ id: Date.now(), vol, date });
            }

            AppState.logs.sort((a,b) => new Date(b.date) - new Date(a.date));
            AppState.save();
            closeModal();
            updateUI();
        }

        function updateSettings() {
            AppState.price = document.getElementById('price-set').value;
            AppState.save();
            updateUI();
        }

        function updateUI() {
            const currentMonth = new Date().toISOString().slice(0, 7);
            const mData = AppState.logs.filter(l => l.date.startsWith(currentMonth));
            const total = mData.reduce((s, e) => s + e.vol, 0);

            document.getElementById('month-label').innerText = new Date().toLocaleDateString('en-US', {month:'long', year:'numeric'}).toUpperCase();
            document.getElementById('total-liters').innerText = total.toFixed(1) + ' L';
            document.getElementById('total-cost').innerText = '₹' + (total * AppState.price).toLocaleString();

            renderRecent(mData);
            renderChart(mData);
        }

        function renderRecent(data) {
            const list = document.getElementById('recent-logs');
            list.innerHTML = data.slice(0, 4).map(l => `
                <div class="item-row">
                    <div class="item-info">
                        <span class="item-date">${new Date(l.date).toLocaleDateString('en-US', {day:'numeric', month:'short'})}</span>
                        <span class="item-sub">₹${(l.vol * AppState.price).toFixed(0)}</span>
                    </div>
                    <div style="font-weight:800; font-size:18px;">${l.vol} L</div>
                </div>
            `).join('') || '<p style="text-align:center; opacity:0.5;">No logs this month.</p>';
        }

        function renderHistory() {
            const list = document.getElementById('history-logs');
            list.innerHTML = AppState.logs.map(l => `
                <div class="item-row">
                    <div class="item-info">
                        <span class="item-date">${l.date}</span>
                        <span class="item-sub">${l.vol} Liters</span>
                    </div>
                    <div class="item-actions">
                        <button class="btn-icon btn-edit" onclick="openModal(${l.id})">✎</button>
                        <button class="btn-icon btn-del" onclick="deleteLog(${l.id})">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteLog(id) {
            if(confirm("Delete record?")) {
                AppState.logs = AppState.logs.filter(l => l.id !== id);
                AppState.save();
                renderHistory();
                updateUI();
            }
        }

        function renderChart(data) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            const sorted = [...data].sort((a,b) => new Date(a.date) - new Date(b.date));
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sorted.slice(-10).map(l => l.date.split('-')[2]),
                    datasets: [{
                        data: sorted.slice(-10).map(l => l.vol),
                        borderColor: '#0061a4',
                        borderWidth: 4,
                        tension: 0.4,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: (c) => {
                            const g = c.chart.ctx.createLinearGradient(0,0,0,300);
                            g.addColorStop(0, 'rgba(0,97,164,0.15)'); g.addColorStop(1, 'rgba(0,97,164,0)'); return g;
                        }
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
                    scales: { y: { display: false, beginAtZero: true }, x: { grid: { display: false } } }
                }
            });
        }

        function wipeData() {
            if(confirm("Wipe all data?")) { localStorage.clear(); location.reload(); }
        }
    </script>
</body>
</html>
